<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Сизифов Труд</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    width:100vw;
    height:100vh;
    touch-action:none;
}

#video-container{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:1;
}

video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

#push-video{
    display:none;
}

#ui-layer{
    position:relative;
    z-index:10;
    text-align:center;
    pointer-events:none;
}

#score-display{
    font-size:12vw;
    font-weight:bold;
    text-shadow:2px 2px 8px rgba(0,0,0,.8);
    margin-bottom:20px;
}

#instruction{
    font-size:5vw;
    opacity:.8;
    text-shadow:1px 1px 4px rgba(0,0,0,.8);
}

#game-area{
    position:absolute;
    inset:0;
    z-index:20;
}
</style>
</head>

<body>

<div id="video-container">
    <video id="down-video" preload="auto" autoplay loop muted playsinline>
        <source src="Down.webm" type="video/webm">
    </video>

    <video id="push-video" preload="auto" muted playsinline>
        <source src="Push.webm" type="video/webm">
    </video>
</div>

<div id="ui-layer">
    <div id="score-display">0</div>
    <div id="instruction">Кати камень вверх! Тапай!</div>
</div>

<div id="game-area"></div>

<script>
const downVideo = document.getElementById("down-video");
const pushVideo = document.getElementById("push-video");

const scoreDisplay = document.getElementById("score-display");
const instruction = document.getElementById("instruction");
const gameArea = document.getElementById("game-area");

function playTapSound() {
    const audio = new Audio("tap.mp3");
    audio.volume = 1.0; 
    audio.play().catch(err => console.log("Аудио заблокировано браузером до первого взаимодействия"));
}

let score = 0;
let started = false;
let pushPlaying = false;

let lastClickTime = 0;
let lastX = null;
let lastY = null;
let clickIntervals = [];

downVideo.load();
pushVideo.load();
downVideo.play().catch(()=>{});

function incrementScore(clientX, clientY, isTouch){
    const now = performance.now();
    const interval = now - lastClickTime;
    
    if (interval < 60) {
        return;
    }
    
    if (clientX !== undefined && clientY !== undefined) {
        const limit = isTouch ? 2 : 0;
        if (Math.abs(clientX - lastX) <= limit && Math.abs(clientY - lastY) <= limit) {
            if (interval < 250) return;
        }
        lastX = clientX;
        lastY = clientY;
    }

    if (clickIntervals.length > 5) {
        clickIntervals.shift();
    }
    clickIntervals.push(interval);
    
    if (clickIntervals.length === 5) {
        let standardDeviation = 0;
        for(let i = 1; i < clickIntervals.length; i++) {
            standardDeviation += Math.abs(clickIntervals[i] - clickIntervals[i-1]);
        }
        if (standardDeviation < 2) {
            return;
        }
    }
    
    lastClickTime = now;

    if(!started){
        started = true;
        instruction.style.display = "none";
        downVideo.play().catch(()=>{});
    }

    score++;
    scoreDisplay.textContent = score;

    playTapSound();

    if(pushPlaying) return;

    pushPlaying = true;
    pushVideo.style.display = "block";
    pushVideo.currentTime = 0;

    pushVideo.play()
        .then(() => {
            downVideo.pause();
            downVideo.style.display = "none";
        })
        .catch(console.error);
}

pushVideo.onended = function(){
    pushPlaying = false;
    pushVideo.pause();
    pushVideo.style.display = "none";
    downVideo.style.display = "block";
    downVideo.play().catch(()=>{});
};

gameArea.addEventListener("mousedown", function(e){
    if (e.isTrusted === false || e.button !== 0) return;
    incrementScore(e.clientX, e.clientY, false);
});

gameArea.addEventListener("touchstart", function(e){
    if (e.isTrusted === false) return;
    e.preventDefault();
    const touch = e.changedTouches[0]; 
    if (touch) {
        incrementScore(touch.clientX, touch.clientY, true);
    }
}, {passive:false});
</script>

</body>
</html>
